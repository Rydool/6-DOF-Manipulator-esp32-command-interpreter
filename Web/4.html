<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Manipulator ESP32 – Panel sterowania</title>
<style>
    body { font-family: Arial; background:#111; color:#eee; margin:0; }
    header { background:#222; padding:10px 20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; }
    h1 { margin:0; font-size:18px; }
    #status { font-size:12px; color:#8f8; }
    main { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:12px; }
    section { background:#181818; padding:10px; border:1px solid #333; border-radius:6px; }
    h2 { margin:0 0 8px 0; font-size:14px; border-bottom:1px solid #333; padding-bottom:4px; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th,td { border:1px solid #333; padding:4px; text-align:center; }
    input[type=number], select { width:70px; background:#111; color:#eee; border:1px solid #444; border-radius:3px; padding:2px; }
    button { background:#2b6; color:#fff; border:1px solid #444; border-radius:4px; padding:4px 8px; cursor:pointer; }
    button:hover { background:#3c8; }
    .terminal { background:#000; height:250px; overflow-y:auto; padding:6px; font-family:monospace; font-size:12px; border:1px solid #444; }
    .terminal-input { display:flex; gap:6px; margin-top:6px; }
    .terminal-input input { flex:1; background:#111; color:#eee; border:1px solid #444; padding:6px; }
    .jog { display:flex; gap:4px; justify-content:center; }
    .jog button { background:#444; }
    .jog button:hover { background:#666; }
    input[type=range] { width:120px; }
    .limit-indicator { width:12px; height:12px; border-radius:50%; display:inline-block; }
</style>
</head>
<body>

<header>
    <h1>Manipulator ESP32 – Panel sterowania</h1>
    <div id="status">Status: ???</div>
</header>

<main>

<!-- TERMINAL -->
<section>
    <h2>Terminal</h2>
    <div class="terminal" id="term"></div>
    <div class="terminal-input">
        <input id="cmd" placeholder="Wpisz komendę, np. POS, JOG X+, MOVE ...">
        <button onclick="sendCmd()">Wyślij</button>
    </div>
</section>

<!-- OSIE -->
<section>
    <h2>Osi / JOG / Pozycje</h2>
    <table>
        <thead>
            <tr>
                <th>Oś</th>
                <th>Aktualna</th>
                <th>Suwak</th>
                <th>Docelowa</th>
                <th>JOG</th>
                <th>GOTO</th>
                <th>HOME</th>
                <th>Krańcówka</th>
            </tr>
        </thead>
        <tbody id="axes"></tbody>
    </table>

    <div style="margin-top:6px; display:flex; gap:6px; align-items:center;">
        <span>Krok JOG:</span>
        <button onclick="setJog(1)">×1</button>
        <button onclick="setJog(5)">×5</button>
        <button onclick="setJog(10)">×10</button>
        <button onclick="setJog(25)">×25</button>
        <span id="jogInfo" style="margin-left:10px; font-size:12px; color:#8f8;">Aktualny: 1°</span>
    </div>

    <button style="margin-top:6px;" onclick="sendCmd('HOME 0')">HOME ALL</button>
</section>

<!-- LIMITY -->
<section>
    <h2>Limity / Prędkości / Przyspieszenia</h2>
    <table>
        <thead>
            <tr><th>Oś</th><th>Min</th><th>Max</th><th>Max vel</th><th>Max acc</th><th>SET</th></tr>
        </thead>
        <tbody id="limits"></tbody>
    </table>
</section>

<!-- PUNKTY P -->
<section>
    <h2>Punkty P (max 20)</h2>

    <div style="display:flex; gap:6px; margin-bottom:6px;">
        <input id="pIndex" type="number" min="1" max="20" value="1">
        <button onclick="saveP()">Zapisz P (z wpisanych wartości)</button>
        <button onclick="savePCurrent()">Zapisz aktualną</button>
    </div>

    <div style="margin-bottom:6px;">
        <select id="pList" size="6" style="width:100%;"></select>
    </div>

    <div style="display:flex; gap:6px;">
        <button onclick="gotoP()">PGOTO</button>
        <button onclick="deleteP()">Usuń</button>
        <button onclick="clearP()">Wyczyść listę</button>
    </div>
</section>

<!-- CHWYTAK -->
<section>
    <h2>Chwytak</h2>
    <table>
        <tr>
            <td>Kąt</td>
            <td><input id="grip" type="number" value="0"></td>
            <td><button onclick="sendCmd('SERVO '+document.getElementById('grip').value)">Ustaw</button></td>
        </tr>
    </table>
</section>

</main>

<script>
const AXES = ["X","Y","Z","A","B","C"];

let state = {
    pos:[0,0,0,0,0,0],
    min:[-180,-180,-180,-180,-180,-180],
    max:[180,180,180,180,180,180],
    vel:[50,50,50,50,50,50],
    acc:[100,100,100,100,100,100],
    limits:[0,0,0,0,0,0]
};

let jogStep = 1;
let pPoints = []; // max 20: {id, pos[6]}

function log(msg){
    const t=document.getElementById("term");
    t.textContent+=msg+"\n";
    t.scrollTop=t.scrollHeight;
}

async function sendCmd(cmd=null){
    if(!cmd) cmd=document.getElementById("cmd").value;
    if(!cmd.trim()) return;
    log("> "+cmd);
    document.getElementById("cmd").value="";
    try{
        let r=await fetch("/api/cmd",{method:"POST",body:cmd});
        let txt=await r.text();
        if (txt.trim().length) log(txt.trim());
    }catch(e){ log("ERR: "+e); }
}

function buildTables(){
    let ax=document.getElementById("axes");
    let lim=document.getElementById("limits");
    ax.innerHTML="";
    lim.innerHTML="";
    AXES.forEach((name,i)=>{
        ax.innerHTML+=`
        <tr>
            <td>${name}</td>
            <td id="cur${i}">0.000</td>
            <td><input type="range" min="-180" max="180" step="0.1" id="slider${i}" oninput="sliderMove(${i})"></td>
            <td><input id="t${i}" type="number" value="0" oninput="targetChanged(${i})"></td>
            <td class="jog">
                <button onclick="jog(${i},-1)">−</button>
                <button onclick="jog(${i},1)">+</button>
            </td>
            <td><button onclick="gotoAxis(${i})">GOTO</button></td>
            <td><button onclick="sendCmd('HOME ${i+1}')">HOME</button></td>
            <td><span id="lim${i}" class="limit-indicator" style="background:#0a0;"></span></td>
        </tr>`;
        lim.innerHTML+=`
        <tr>
            <td>${name}</td>
            <td><input id="min${i}" type="number" value="${state.min[i]}"></td>
            <td><input id="max${i}" type="number" value="${state.max[i]}"></td>
            <td><input id="vel${i}" type="number" value="${state.vel[i]}"></td>
            <td><input id="acc${i}" type="number" value="${state.acc[i]}"></td>
            <td><button onclick="setLimits(${i})">SET</button></td>
        </tr>`;
    });
}

function setJog(v){
    jogStep = v;
    document.getElementById("jogInfo").textContent = "Aktualny: " + v + "°";
}

function sliderMove(i){
    let v=document.getElementById("slider"+i).value;
    document.getElementById("t"+i).value=v;
}

function targetChanged(i){
    let v=document.getElementById("t"+i).value;
    document.getElementById("slider"+i).value=v;
}

function jog(i,dir){
    sendCmd(`JOG ${AXES[i]}${dir>0?'+':'-'} ${jogStep}`);
}

function gotoAxis(i){
    let v=parseFloat(document.getElementById("t"+i).value);
    if (isNaN(v)) return;
    sendCmd(`GOTO ${AXES[i]}${v} F50`);
}

function setLimits(i){
    let min=document.getElementById("min"+i).value;
    let max=document.getElementById("max"+i).value;
    sendCmd(`SETLIMIT ${i+1} ${min} ${max}`);
}

async function poll(){
    try{
        let r=await fetch("/api/status");
        let j=await r.json();
        state=j;

        document.getElementById("status").textContent="Status: OK";
        document.getElementById("status").style.color="#8f8";

        AXES.forEach((_,i)=>{
            document.getElementById("cur"+i).textContent=state.pos[i].toFixed(3);
            document.getElementById("slider"+i).value=state.pos[i];
            document.getElementById("t"+i).value=state.pos[i];

            let lim=document.getElementById("lim"+i);
            lim.style.background = state.limits && state.limits[i] ? "#f00" : "#0a0";
        });

    }catch(e){
        document.getElementById("status").textContent="Status: brak odpowiedzi / offline";
        document.getElementById("status").style.color="#f66";
    }
}

function updatePList(){
    let list=document.getElementById("pList");
    list.innerHTML="";
    pPoints.sort((a,b)=>a.id-b.id);
    pPoints.forEach(p=>{
        list.innerHTML+=`<option value="${p.id}">P${p.id} — ${p.pos.map(v=>v.toFixed(1)).join(", ")}</option>`;
    });
}

function saveP(){
    let idx=parseInt(document.getElementById("pIndex").value);
    if (isNaN(idx) || idx<1 || idx>20) return;

    let pos=[];
    for(let i=0;i<AXES.length;i++){
        let v=parseFloat(document.getElementById("t"+i).value);
        if (isNaN(v)) v=0;
        pos.push(v);
    }

    pPoints = pPoints.filter(p=>p.id!==idx);
    pPoints.push({id:idx,pos});
    updatePList();
}

function savePCurrent(){
    let idx=parseInt(document.getElementById("pIndex").value);
    if (isNaN(idx) || idx<1 || idx>20) return;

    let pos=[...state.pos];
    pPoints = pPoints.filter(p=>p.id!==idx);
    pPoints.push({id:idx,pos});
    updatePList();
}

function gotoP(){
    let idx=parseInt(document.getElementById("pList").value);
    if (isNaN(idx)) return;
    let p=pPoints.find(p=>p.id===idx);
    if (!p) return;

    let cmd="GOTO ";
    AXES.forEach((a,i)=>{
        cmd+=`${a}${p.pos[i]} `;
    });
    cmd+="F50";
    sendCmd(cmd);
}

function deleteP(){
    let idx=parseInt(document.getElementById("pList").value);
    if (isNaN(idx)) return;
    pPoints = pPoints.filter(p=>p.id!==idx);
    updatePList();
}

function clearP(){
    pPoints=[];
    updatePList();
}

buildTables();
setInterval(poll,1000);
</script>

</body>
</html>
