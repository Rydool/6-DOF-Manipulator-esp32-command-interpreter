<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Manipulator ESP32 – Panel sterowania</title>
<style>
    body { font-family: Arial; background:#111; color:#eee; margin:0; }
    header { background:#222; padding:10px 20px; border-bottom:1px solid #333; }
    h1 { margin:0; font-size:18px; }
    main { display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:12px; }
    section { background:#181818; padding:10px; border:1px solid #333; border-radius:6px; }
    h2 { margin:0 0 8px 0; font-size:14px; border-bottom:1px solid #333; padding-bottom:4px; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    th,td { border:1px solid #333; padding:4px; text-align:center; }
    input[type=number] { width:70px; background:#111; color:#eee; border:1px solid #444; border-radius:3px; padding:2px; }
    button { background:#2b6; color:#fff; border:1px solid #444; border-radius:4px; padding:4px 8px; cursor:pointer; }
    button:hover { background:#3c8; }
    .terminal { background:#000; height:250px; overflow-y:auto; padding:6px; font-family:monospace; font-size:12px; border:1px solid #444; }
    .terminal-input { display:flex; gap:6px; margin-top:6px; }
    .terminal-input input { flex:1; background:#111; color:#eee; border:1px solid #444; padding:6px; }
    .jog { display:flex; gap:4px; justify-content:center; }
    .jog button { background:#444; }
    .jog button:hover { background:#666; }
</style>
</head>
<body>

<header>
    <h1>Manipulator ESP32 – Panel sterowania</h1>
</header>

<main>

<!-- TERMINAL -->
<section>
    <h2>Terminal</h2>
    <div class="terminal" id="term"></div>
    <div class="terminal-input">
        <input id="cmd" placeholder="Wpisz komendę, np. POS, JOG X+, MOVE ...">
        <button onclick="sendCmd()">Wyślij</button>
    </div>
</section>

<!-- OSIE -->
<section>
    <h2>Osi / JOG / Pozycje</h2>
    <table>
        <thead>
            <tr><th>Oś</th><th>Aktualna</th><th>Docelowa</th><th>JOG</th><th>GOTO</th></tr>
        </thead>
        <tbody id="axes"></tbody>
    </table>
    <div style="margin-top:6px;">Krok JOG: <input id="jogStep" type="number" value="1" step="0.1"></div>
</section>

<!-- LIMITY -->
<section>
    <h2>Limity / Prędkości / Przyspieszenia</h2>
    <table>
        <thead>
            <tr><th>Oś</th><th>Min</th><th>Max</th><th>Max vel</th><th>Max acc</th><th>SET</th></tr>
        </thead>
        <tbody id="limits"></tbody>
    </table>
</section>

<!-- CHWYTAK -->
<section>
    <h2>Chwytak</h2>
    <table>
        <tr>
            <td>Kąt</td>
            <td><input id="grip" type="number" value="0"></td>
            <td><button onclick="sendCmd('SERVO '+document.getElementById('grip').value)">Ustaw</button></td>
        </tr>
    </table>
</section>

</main>

<script>
const AXES = ["X","Y","Z","A","B","C"];
let state = {
    pos:[0,0,0,0,0,0],
    min:[-180,-180,-180,-180,-180,-180],
    max:[180,180,180,180,180,180],
    vel:[50,50,50,50,50,50],
    acc:[100,100,100,100,100,100]
};

function log(msg){
    const t=document.getElementById("term");
    t.textContent+=msg+"\n";
    t.scrollTop=t.scrollHeight;
}

async function sendCmd(cmd=null){
    if(!cmd) cmd=document.getElementById("cmd").value;
    if(!cmd.trim()) return;
    log("> "+cmd);
    document.getElementById("cmd").value="";
    try{
        let r=await fetch("/api/cmd",{method:"POST",body:cmd});
        let txt=await r.text();
        log(txt.trim());
    }catch(e){ log("ERR: "+e); }
}

function buildTables(){
    let ax=document.getElementById("axes");
    let lim=document.getElementById("limits");
    ax.innerHTML="";
    lim.innerHTML="";
    AXES.forEach((name,i)=>{
        ax.innerHTML+=`
        <tr>
            <td>${name}</td>
            <td id="cur${i}">0.000</td>
            <td><input id="t${i}" type="number" value="0"></td>
            <td class="jog">
                <button onclick="jog(${i},-1)">−</button>
                <button onclick="jog(${i},1)">+</button>
            </td>
            <td><button onclick="gotoAxis(${i})">GOTO</button></td>
        </tr>`;
        lim.innerHTML+=`
        <tr>
            <td>${name}</td>
            <td><input id="min${i}" type="number" value="${state.min[i]}"></td>
            <td><input id="max${i}" type="number" value="${state.max[i]}"></td>
            <td><input id="vel${i}" type="number" value="${state.vel[i]}"></td>
            <td><input id="acc${i}" type="number" value="${state.acc[i]}"></td>
            <td><button onclick="setLimits(${i})">SET</button></td>
        </tr>`;
    });
}

function jog(i,dir){
    let step=parseFloat(document.getElementById("jogStep").value)||1;
    sendCmd(`JOG ${AXES[i]}${dir>0?'+':'-'} ${step}`);
}

function gotoAxis(i){
    let v=parseFloat(document.getElementById("t"+i).value);
    sendCmd(`GOTO ${AXES[i]}${v} F50`);
}

function setLimits(i){
    let min=document.getElementById("min"+i).value;
    let max=document.getElementById("max"+i).value;
    sendCmd(`SETLIMIT ${i+1} ${min} ${max}`);
}

async function poll(){
    try{
        let r=await fetch("/api/status");
        let j=await r.json();
        state=j;
        AXES.forEach((_,i)=>{
            document.getElementById("cur"+i).textContent=state.pos[i].toFixed(3);
            document.getElementById("min"+i).value=state.min[i];
            document.getElementById("max"+i).value=state.max[i];
            document.getElementById("vel"+i).value=state.vel[i];
            document.getElementById("acc"+i).value=state.acc[i];
        });
    }catch(e){
        // brak odpowiedzi = ESP offline
    }
}

buildTables();
setInterval(poll,1000);
</script>

</body>
</html>
